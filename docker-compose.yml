services:
  postgres:
    image: postgres:16-alpine
    container_name: parahive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: parahive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - parahive_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d parahive"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  parahive_postgres_data:
